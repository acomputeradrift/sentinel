<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote Box Layout - Flexbox</title>
  <style>
    :root {
      --frame-w: min(94vw, 608px);
      --frame-h: calc(var(--frame-w) * 732 / 608);

      --red: #ff4a22;
      --stroke: 4px;
      --radius: 18px;

      --r1-w: calc(var(--frame-w) * 146 / 608);
      --r1-h: calc(var(--frame-h) * 78 / 732);

      --small-w: calc(var(--frame-w) * 123 / 608);
      --small-h: calc(var(--frame-h) * 56 / 732);

      --side-w: calc(var(--frame-w) * 111 / 608);
      --side-h: calc(var(--frame-h) * 175 / 732);

      --dpad-side-w: calc(var(--frame-w) * 92 / 608);
      --dpad-w: calc(var(--frame-w) * 101 / 608);
      --dpad-h: calc(var(--frame-h) * 105 / 732);

      --top-pad: calc(var(--frame-h) * 52 / 732);
      --gap-after-row1: calc(var(--frame-h) * 57 / 732);
      --gap-after-row2: calc(var(--frame-h) * 25 / 732);
      --gap-before-row3: calc(var(--frame-h) * 24 / 732);

      --row-side-pad: calc(var(--frame-w) * 28 / 608);
      --small-row-side-pad: calc(var(--frame-w) * 33 / 608);

      --side-stack-gap: calc(var(--frame-h) * 16 / 732);
      --dpad-gap-x: calc(var(--frame-w) * 8 / 608);
      --dpad-gap-y: calc(var(--frame-h) * 5 / 732);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .frame {
      width: var(--frame-w);
      height: var(--frame-h);
      display: flex;
      flex-direction: column;
      padding-top: var(--top-pad);
      background: #ffffff;
    }

    .box {
      flex: 0 0 auto;
      border: var(--stroke) solid var(--red);
      border-radius: var(--radius);
      background: transparent;
    }

    .row {
      display: flex;
      align-items: center;
    }

    .row1 {
      justify-content: space-between;
      padding: 0 var(--row-side-pad);
    }

    .row1 .box {
      width: var(--r1-w);
      height: var(--r1-h);
    }

    .row2,
    .row3 {
      justify-content: space-between;
      padding: 0 var(--small-row-side-pad);
    }

    .row2 .box,
    .row3 .box {
      width: var(--small-w);
      height: var(--small-h);
    }

    .middle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 var(--small-row-side-pad);
    }

    .side-stack {
      display: flex;
      flex-direction: column;
      gap: var(--side-stack-gap);
    }

    .side-stack .box {
      width: var(--side-w);
      height: var(--side-h);
    }

    .dpad {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--dpad-gap-y);
    }

    .dpad-row {
      display: flex;
      align-items: center;
      gap: var(--dpad-gap-x);
    }

    .dpad .up,
    .dpad .ok,
    .dpad .down {
      width: var(--dpad-w);
      height: var(--dpad-h);
    }

    .dpad .left,
    .dpad .right {
      width: var(--dpad-side-w);
      height: var(--dpad-h);
    }

    .spacer-row1-to-row2 { height: var(--gap-after-row1); }
    .spacer-row2-to-middle { height: var(--gap-after-row2); }
    .spacer-middle-to-row3 { height: var(--gap-before-row3); flex: 1 1 auto; }
  </style>
</head>
<body>
  <div class="frame" aria-label="Remote red box layout using flexbox">
    <div class="row row1">
      <div class="box" data-label="Row 1 Col 1"></div>
      <div class="box" data-label="Row 1 Col 2"></div>
      <div class="box" data-label="Row 1 Col 3"></div>
    </div>

    <div class="spacer-row1-to-row2"></div>

    <div class="row row2">
      <div class="box" data-label="Row 2 Col 1"></div>
      <div class="box" data-label="Row 2 Col 2"></div>
      <div class="box" data-label="Row 2 Col 3"></div>
      <div class="box" data-label="Row 2 Col 4"></div>
    </div>

    <div class="spacer-row2-to-middle"></div>

    <div class="middle">
      <div class="side-stack">
        <div class="box" data-label="Chan Up"></div>
        <div class="box" data-label="Chan Down"></div>
      </div>

      <div class="dpad">
        <div class="box up" data-label="Curs Up"></div>
        <div class="dpad-row">
          <div class="box left" data-label="Curs Left"></div>
          <div class="box ok" data-label="Curs Ok"></div>
          <div class="box right" data-label="Curs Right"></div>
        </div>
        <div class="box down" data-label="Curs Down"></div>
      </div>

      <div class="side-stack">
        <div class="box" data-label="Vol Up"></div>
        <div class="box" data-label="Vol Down"></div>
      </div>
    </div>

    <div class="spacer-middle-to-row3"></div>

    <div class="row row3">
      <div class="box" data-label="Row 3 Col 1"></div>
      <div class="box" data-label="Row 3 Col 2"></div>
      <div class="box" data-label="Row 3 Col 3"></div>
      <div class="box" data-label="Row 3 Col 4"></div>
    </div>
  </div>
</body>
</html>
