<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sentinel • Commissioning Console</title>
    <link rel="stylesheet" href="./commissioning.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <h1>Commissioning Console</h1>
        <p class="sub">Local MVP UI skeleton (contract-driven).</p>
      </header>

      <section class="card">
        <h2>Client</h2>
        <div class="row">
          <label class="field">
            <span>New client name</span>
            <input id="newClientName" type="text" placeholder="e.g. Verrier Home" />
          </label>
          <button id="createClientBtn" type="button">Create client</button>
        </div>
        <div class="row">
          <label class="field grow">
            <span>Client</span>
            <select id="clientSelect" aria-label="Client"></select>
          </label>
          <button id="refreshClientsBtn" type="button">Refresh</button>
        </div>
        <div class="status" id="clientStatus"></div>
      </section>

      <section class="card">
        <h2>Project</h2>
        <div class="row">
          <label class="field grow">
            <span>New project name</span>
            <input id="newProjectName" type="text" placeholder="e.g. iPhone v55.2" />
          </label>
          <button id="createProjectBtn" type="button">Create project</button>
        </div>
        <div class="row">
          <label class="field grow">
            <span>Project</span>
            <select id="projectSelect" aria-label="Project"></select>
          </label>
          <button id="refreshProjectsBtn" type="button">Refresh</button>
        </div>
        <div class="status" id="projectStatus"></div>
      </section>

      <section class="card">
        <h2>Upload + Regenerate</h2>
        <div class="row">
          <label class="field grow">
            <span>.apex file</span>
            <input type="file" name="apex" id="apexFile" accept=".apex" />
          </label>
          <button id="uploadBtn" type="button">Upload .apex</button>
        </div>
        <div class="status" data-testid="upload-status" id="uploadStatus"></div>

        <div class="row">
          <button id="regenerateBtn" type="button">Regenerate</button>
        </div>
        <div class="status" data-testid="regen-status" id="regenStatus"></div>
      </section>

      <section class="card">
        <h2>Tech links</h2>
        <div class="row">
          <label class="field grow">
            <span>Tech label</span>
            <input id="techLabel" type="text" placeholder="e.g. Onsite Tech" />
          </label>
          <button id="createTechLinkBtn" type="button">Create tech link</button>
        </div>
        <div class="status">
          <div class="mono" data-testid="tech-url" id="techUrl"></div>
        </div>
      </section>

      <section class="card">
        <h2>Progress</h2>
        <div class="row">
          <button id="refreshProgressBtn" type="button">Refresh progress</button>
        </div>
        <pre class="mono" data-testid="progress" id="progress"></pre>
      </section>

      <section class="card">
        <h2>Fails (placeholder)</h2>
        <p class="sub">Will render once commissioning read endpoints exist.</p>
        <pre class="mono" id="fails"></pre>
      </section>
    </main>

    <script src="./commissioning.js"></script>
  </body>
</html>
