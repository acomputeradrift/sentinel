<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Device Static Layout</title>
  <link rel="stylesheet" href="./project_device_static_layout.css">
</head>
<body>
  <input class="panel-toggle" type="checkbox" id="left-panel-toggle" checked>
  <input class="panel-toggle" type="checkbox" id="right-panel-toggle" checked>

  <div id="appCanvas" class="projectDeviceStaticLayout" aria-label="Project Device Static Layout">
    <header id="deviceHeaderCanvas" class="deviceHeaderCanvas">
      <div class="app-ui-controls top-controls" id="topControlsStatic">
        <a class="project-home-link" href="#" aria-label="Project Home">Project Home</a>
        <div class="header">Device / Page</div>
        <div class="top-controls-spacer" aria-hidden="true"></div>
      </div>
    </header>

    <main class="deviceLayoutStage">
      <section id="rtiUsableCanvas" class="rtiUsableCanvas">
        <div id="vpOverlay" class="vp-overlay" hidden></div>
        <div id="rtiDeviceCanvas" class="rtiDeviceCanvas">
          <div id="rtiDeviceContent" class="rtiDeviceContent"></div>
        </div>
      </section>
      <footer id="deviceFooterCanvas" class="deviceFooterCanvas"></footer>

      <aside id="deviceViewControlsCanvas" class="deviceControlsCanvas deviceControlsCanvasLeft" aria-label="Device View Controls">
        <div class="deviceViewControlsContent" aria-label="Static View Controls">
          <section class="viewControlGroup" aria-label="Device Zoom">
            <h3 class="viewControlLabel">Device</h3>
            <div id="zoomControlsStatic" class="staticZoomControls" role="group" aria-label="Device zoom controls">
              <button class="zoomBtn zoomBtnDec zoom-btn zoom-dec" type="button" aria-label="Decrease device zoom">-</button>
              <button class="zoomBtn zoomBtnReset zoom-btn zoom-reset" type="button" aria-label="Device zoom percent">100%</button>
              <button class="zoomBtn zoomBtnInc zoom-btn zoom-inc" type="button" aria-label="Increase device zoom">+</button>
            </div>
          </section>

          <section class="viewControlGroup" aria-label="Text Zoom">
            <h3 class="viewControlLabel">Text</h3>
            <div id="textZoomControlsStatic" class="staticZoomControls" role="group" aria-label="Text zoom controls">
              <button class="zoomBtn zoomBtnDec" type="button" aria-label="Decrease text zoom" data-control="text-zoom-dec" data-variant="full">-</button>
              <button class="zoomBtn zoomBtnReset" type="button" aria-label="Text zoom percent" data-control="text-zoom-reset" data-variant="full">100%</button>
              <button class="zoomBtn zoomBtnInc" type="button" aria-label="Increase text zoom" data-control="text-zoom-inc" data-variant="full">+</button>
            </div>
          </section>

          <section class="viewControlGroup" aria-label="Orientation Controls">
            <h3 class="viewControlLabel">Orientation</h3>
            <div class="orientationToggleStatic orientation-toggle" role="group" aria-label="Orientation controls">
              <button class="orientationBtnStatic orientation-btn" type="button" aria-label="Portrait orientation" data-orientation="portrait">Portrait</button>
              <button class="orientationBtnStatic orientationBtnStaticActive orientation-btn active" type="button" aria-label="Landscape orientation" data-orientation="landscape">Landscape</button>
            </div>
          </section>
        </div>

        <div class="collapsedViewControls" aria-label="Collapsed View Controls">
          <section class="collapsedControlGroup" aria-label="Collapsed Device Zoom">
            <div class="collapsedControlLabel">D</div>
            <button class="zoomBtn zoomBtnMini" type="button" aria-label="Increase device zoom" data-control="device-zoom-inc" data-variant="mini">+</button>
            <button class="zoomBtn zoomBtnResetMini" type="button" aria-label="Device zoom percent" data-control="device-zoom-reset" data-variant="mini"><span class="zoomPctVertical">100%</span></button>
            <button class="zoomBtn zoomBtnMini" type="button" aria-label="Decrease device zoom" data-control="device-zoom-dec" data-variant="mini">-</button>
          </section>

          <section class="collapsedControlGroup" aria-label="Collapsed Text Zoom">
            <div class="collapsedControlLabel">T</div>
            <button class="zoomBtn zoomBtnMini" type="button" aria-label="Increase text zoom" data-control="text-zoom-inc" data-variant="mini">+</button>
            <button class="zoomBtn zoomBtnResetMini" type="button" aria-label="Text zoom percent" data-control="text-zoom-reset" data-variant="mini"><span class="zoomPctVertical">100%</span></button>
            <button class="zoomBtn zoomBtnMini" type="button" aria-label="Decrease text zoom" data-control="text-zoom-dec" data-variant="mini">-</button>
          </section>

          <section class="collapsedControlGroup" aria-label="Collapsed Orientation Placeholder">
            <div class="collapsedControlLabel">O</div>
            <button class="zoomBtn zoomBtnMini zoomBtnMiniOrient orientation-btn" type="button" data-orientation="portrait" data-control="orientation-portrait" data-variant="mini" aria-label="Portrait orientation">P</button>
            <button class="zoomBtn zoomBtnMini zoomBtnMiniOrient orientation-btn active" type="button" data-orientation="landscape" data-control="orientation-landscape" data-variant="mini" aria-label="Landscape orientation">L</button>
          </section>
        </div>
        <label class="deviceControlsToggle deviceControlsToggleLeft" for="left-panel-toggle" aria-label="Toggle left controls"></label>
      </aside>

      <aside id="deviceLayerControlsCanvas" class="deviceControlsCanvas deviceControlsCanvasRight app-ui-controls layer-controls" aria-label="Device Layer Controls">
        <div class="deviceLayerControlsContent" aria-label="Layer Controls Placeholder">
          <div class="layer-panel layer-panel-static" aria-label="Layer panel">
            <div class="layer-panel-title">Layers</div>
            <div class="layer-list">
              <button class="layer-toggle" type="button" aria-label="Layer 1 active">Layer 1</button>
              <button class="layer-toggle is-inactive" type="button" aria-label="Layer 2 inactive">Layer 2</button>
              <button class="layer-toggle is-inactive" type="button" aria-label="Layer 3 inactive">Layer 3</button>
            </div>
          </div>
        </div>
        <label class="deviceControlsToggle deviceControlsToggleRight" for="right-panel-toggle" aria-label="Toggle right controls"></label>
      </aside>
    </main>
  </div>
  <script data-shell-runtime-adapter="1">
    (function () {
      const HOOK_REMAP = [
        ["#topControls", "#topControlsStatic"],
        ["#orientationToggle", ".orientationToggleStatic"],
        [".orientation-btn", ".orientationBtnStatic"],
        ["#zoomControls", "#zoomControlsStatic"],
        [".zoom-dec", ".zoomBtnDec"],
        [".zoom-reset", ".zoomBtnReset"],
        [".zoom-inc", ".zoomBtnInc"],
        ["#layerControls", "#deviceLayerControlsCanvas"],
        ["#layerPanel", ".layer-panel"],
        ["#layerList", ".layer-list"],
        ["#rtiCanvas", "#rtiUsableCanvas"],
        ["#rtiContent", "#rtiDeviceCanvas"],
        ["#rtiDeviceCanvas", "#rtiDeviceContent"],
        ["#bottomControls", "#deviceFooterCanvas"]
      ];

      function escapeRegExp(value) {
        return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function remapText(text) {
        let result = String(text || "");
        const placeholders = [];
        HOOK_REMAP.forEach(function (pair, index) {
          const from = pair[0];
          const token = "__SHELL_HOOK_" + String(index) + "__";
          placeholders.push([token, pair[1]]);
          result = result.replace(new RegExp(escapeRegExp(from), "g"), token);
        });
        placeholders.forEach(function (pair) {
          const token = pair[0];
          const to = pair[1];
          result = result.replace(new RegExp(escapeRegExp(token), "g"), to);
        });
        return result;
      }

      function mountTopControls(sourceDoc) {
        const src = sourceDoc.getElementById("topControls");
        const dst = document.getElementById("topControlsStatic");
        if (!src || !dst) return;
        const home = src.querySelector(".project-home-link");
        const header = src.querySelector(".header");
        if (home) {
          const slot = dst.querySelector(".project-home-link");
          if (slot) slot.outerHTML = home.outerHTML;
        }
        if (header) {
          const slot = dst.querySelector(".header");
          if (slot) slot.outerHTML = header.outerHTML;
        }
        const srcSelected = src.querySelector("#selectedRoomIndicator");
        const existingSelected = dst.querySelector("#selectedRoomIndicator");
        if (srcSelected) {
          if (existingSelected) existingSelected.outerHTML = srcSelected.outerHTML;
          else dst.insertAdjacentHTML("beforeend", srcSelected.outerHTML);
        } else if (existingSelected) {
          existingSelected.remove();
        }
      }

      function mountOrientation(sourceDoc) {
        const srcToggle = sourceDoc.getElementById("orientationToggle");
        const dstToggle = document.querySelector(".orientationToggleStatic");
        if (!dstToggle) return;
        if (!srcToggle) {
          const group = dstToggle.closest(".viewControlGroup");
          const collapsed = document.querySelector('.collapsedControlGroup[aria-label="Collapsed Orientation Placeholder"]');
          if (group) group.hidden = true;
          if (collapsed) collapsed.hidden = true;
          return;
        }
        dstToggle.innerHTML = remapText(srcToggle.innerHTML || "");
        dstToggle.querySelectorAll("button").forEach(function (btn) {
          btn.classList.add("orientationBtnStatic");
          if (btn.classList.contains("active")) {
            btn.classList.add("orientationBtnStaticActive");
          }
        });
        annotateControls();
      }

      function mountZoom(sourceDoc) {
        const srcZoom = sourceDoc.getElementById("zoomControls");
        const dstZoom = document.getElementById("zoomControlsStatic");
        if (!srcZoom || !dstZoom) return;
        dstZoom.innerHTML = remapText(srcZoom.innerHTML || "");
        dstZoom.querySelectorAll("button").forEach(function (btn) {
          if (btn.classList.contains("zoom-dec")) {
            btn.classList.add("zoomBtn", "zoomBtnDec");
          }
          if (btn.classList.contains("zoom-reset")) {
            btn.classList.add("zoomBtn", "zoomBtnReset");
          }
          if (btn.classList.contains("zoom-inc")) {
            btn.classList.add("zoomBtn", "zoomBtnInc");
          }
        });
        annotateControls();
      }

      function annotateControls() {
        const deviceRoot = document.getElementById("zoomControlsStatic");
        if (deviceRoot) {
          const dec = deviceRoot.querySelector(".zoom-dec");
          const reset = deviceRoot.querySelector(".zoom-reset");
          const inc = deviceRoot.querySelector(".zoom-inc");
          if (dec) {
            dec.setAttribute("data-control", "device-zoom-dec");
            dec.setAttribute("data-variant", "full");
          }
          if (reset) {
            reset.setAttribute("data-control", "device-zoom-reset");
            reset.setAttribute("data-variant", "full");
          }
          if (inc) {
            inc.setAttribute("data-control", "device-zoom-inc");
            inc.setAttribute("data-variant", "full");
          }
        }
        const fullOrientation = document.querySelector(".orientationToggleStatic");
        if (fullOrientation) {
          fullOrientation.querySelectorAll(".orientation-btn").forEach(function (button) {
            const orientation = String(button.getAttribute("data-orientation") || "");
            if (!orientation) return;
            button.setAttribute("data-control", "orientation-" + orientation);
            button.setAttribute("data-variant", "full");
          });
        }
      }

      function mountLayers(sourceDoc) {
        const srcPanel = sourceDoc.getElementById("layerPanel");
        const dstPanel = document.querySelector("#deviceLayerControlsCanvas .layer-panel");
        if (!dstPanel) return;
        if (!srcPanel) {
          dstPanel.setAttribute("hidden", "hidden");
          return;
        }
        const srcTitle = srcPanel.querySelector(".layer-panel-title");
        const dstTitle = dstPanel.querySelector(".layer-panel-title");
        if (srcTitle && dstTitle) {
          dstTitle.textContent = srcTitle.textContent || "";
        }
        const srcList = srcPanel.querySelector("#layerList, .layer-list");
        const dstList = dstPanel.querySelector(".layer-list");
        if (srcList && dstList) {
          dstList.innerHTML = remapText(srcList.innerHTML || "");
        }
      }

      function mountRtiContent(sourceDoc) {
        const src = sourceDoc.getElementById("rtiDeviceCanvas");
        const dst = document.getElementById("rtiDeviceContent");
        if (!src || !dst) return;
        dst.innerHTML = src.innerHTML || "";
        // Source canvas wrapper carries hard-key split sizing (data-hk-design-w/h) and layout
        // classes; innerHTML alone drops that node — runtime maps getElementById("rtiDeviceCanvas")
        // to #rtiDeviceContent, so mirror attributes/classes onto the mount target.
        ["data-hk-model", "data-hk-design-w", "data-hk-design-h"].forEach(function (name) {
          if (src.hasAttribute(name)) {
            dst.setAttribute(name, src.getAttribute(name) || "");
          } else {
            dst.removeAttribute(name);
          }
        });
        dst.classList.remove("rti-device-canvas", "rti-device-canvas-hk");
        if (src.classList.contains("rti-device-canvas")) {
          dst.classList.add("rti-device-canvas");
        }
        if (src.classList.contains("rti-device-canvas-hk")) {
          dst.classList.add("rti-device-canvas-hk");
        }
      }

      function mountPopups(sourceDoc) {
        ["vpPopup", "ov"].forEach(function (id) {
          const src = sourceDoc.getElementById(id);
          if (!src) return;
          const existing = document.getElementById(id);
          if (existing) existing.remove();
          document.body.appendChild(src.cloneNode(true));
        });
      }

      function copyFilteredStyles(sourceDoc) {
        const allowTokens = [
          ".rti-canvas",
          ".rti-content",
          ".rti-device-canvas",
          ".device-page",
          ".vp-box",
          ".vp-overlay",
          ".btn-wrap",
          ".synthetic-list-scroll",
          ".test-btn",
          ".btn-pass-total",
          ".page-link-hit",
          ".page-link-icon",
          ".material-symbols-outlined",
          ".vp-popup",
          ".vp-popup-panel",
          ".vp-popup-scroller",
          ".vp-popup-stage",
          ".vp-popup-scrollpad",
          ".vp-popup-close",
          ".vp-popup-nav",
          ".vp-popup-prev",
          ".vp-popup-next",
          ".vp-popup-up",
          ".vp-popup-down",
          ".vp-popup-indicator",
          ".vp-popup-viewport",
          ".vp-popup-vcontent",
          ".vp-indicator",
          ".dot",
          ".viewport-mode",
          ".hk-split-right .",
          ".hk-split-left .",
          ".hk-test-btn"
        ];
        const blockTokens = [
          ".app-canvas",
          ".app-ui-controls",
          ".top-controls",
          ".bottom-controls",
          ".left-controls",
          ".right-controls",
          ".layer-controls",
          ".orientation-controls",
          ".zoom-controls",
          "#topControls",
          "#bottomControls",
          "#layerControls",
          "#orientationControls",
          "#zoomControls",
          "#rtiCanvas",
          "#rtiContent",
          "#rtiDeviceCanvas"
        ];

        function allowSelector(sel) {
          const s = String(sel || "");
          if (!s) return false;
          if (s.indexOf(".viewport-mode #rtiCanvas") >= 0) return true;
          if (s.indexOf("#") >= 0) return false;
          for (let i = 0; i < blockTokens.length; i += 1) {
            if (s.indexOf(blockTokens[i]) >= 0) return false;
          }
          for (let i = 0; i < allowTokens.length; i += 1) {
            if (s.indexOf(allowTokens[i]) >= 0) return true;
          }
          return false;
        }

        const styles = sourceDoc.querySelectorAll("style");
        styles.forEach(function (node, idx) {
          if (node.getAttribute && node.getAttribute("data-sentinel-hard-key-template") === "1") {
            const raw = String(node.textContent || "");
            if (!raw.trim()) return;
            const style = document.createElement("style");
            style.setAttribute("data-shell-source-style-hard-keys", "1");
            style.textContent = remapText(raw);
            document.head.appendChild(style);
            return;
          }
          const raw = String(node.textContent || "");
          if (!raw.trim()) return;
          const blocks = raw.split("}");
          const kept = [];
          blocks.forEach(function (block) {
            const rule = String(block || "").trim();
            if (!rule) return;
            const brace = rule.indexOf("{");
            if (brace <= 0) return;
            const selector = rule.slice(0, brace).trim();
            if (!allowSelector(selector)) return;
            kept.push(remapText(selector + "{" + rule.slice(brace + 1) + "}"));
          });
          if (!kept.length) return;
          const style = document.createElement("style");
          style.setAttribute("data-shell-source-style-filtered", String(idx));
          style.textContent = kept.join("\n");
          document.head.appendChild(style);
        });
      }

      function copyAllowedHeadLinks(sourceDoc) {
        const links = sourceDoc.querySelectorAll('link[rel="stylesheet"]');
        links.forEach(function (link, index) {
          const href = String(link.getAttribute("href") || "");
          if (!href) return;
          const isMaterialSymbols = href.indexOf("fonts.googleapis.com") >= 0 && href.indexOf("Material+Symbols+Outlined") >= 0;
          if (!isMaterialSymbols) return;
          if (document.querySelector('link[data-shell-source-font="' + String(index) + '"]')) return;
          const clone = document.createElement("link");
          clone.setAttribute("rel", "stylesheet");
          clone.setAttribute("href", href);
          clone.setAttribute("data-shell-source-font", String(index));
          document.head.appendChild(clone);
        });
      }

      function installSelectorAdapter() {
        const idMap = {
          topControls: "topControlsStatic",
          orientationToggle: "__shell_orientation_toggle__",
          zoomControls: "zoomControlsStatic",
          layerControls: "deviceLayerControlsCanvas",
          layerPanel: "__shell_layer_panel__",
          layerList: "__shell_layer_list__",
          rtiCanvas: "rtiUsableCanvas",
          rtiContent: "rtiDeviceCanvas",
          rtiDeviceCanvas: "rtiDeviceContent",
          bottomControls: "deviceFooterCanvas"
        };

        const documentGetById = document.getElementById.bind(document);
        document.getElementById = function (id) {
          const mapped = idMap[id] || id;
          if (mapped === "__shell_orientation_toggle__") {
            return document.querySelector(".orientationToggleStatic");
          }
          if (mapped === "__shell_layer_panel__") {
            return document.querySelector(".layer-panel");
          }
          if (mapped === "__shell_layer_list__") {
            return document.querySelector(".layer-list");
          }
          return documentGetById(mapped);
        };
      }

      function parsePxVariable(name, fallback) {
        const raw = getComputedStyle(document.documentElement).getPropertyValue(name) || "";
        const value = Number.parseFloat(String(raw).trim().replace("px", ""));
        return Number.isFinite(value) ? value : fallback;
      }

      function lockShellGeometry() {
        const rti = document.getElementById("rtiUsableCanvas");
        const right = document.getElementById("deviceLayerControlsCanvas");
        const layerPanel = document.querySelector("#deviceLayerControlsCanvas .layer-panel");
        if (rti) {
          rti.style.left = "";
          rti.style.top = "";
          rti.style.width = "";
          rti.style.height = "";
          rti.style.bottom = "";
          rti.style.right = "";
        }
        if (right) {
          right.style.width = "";
          right.style.left = "";
          right.style.right = "";
          right.style.top = "";
          right.style.bottom = "";
          right.style.height = "";
        }
        if (layerPanel) {
          layerPanel.style.width = "";
          layerPanel.style.maxHeight = "";
        }
      }

      function observeShellGeometry() {
        const targets = [
          document.getElementById("rtiUsableCanvas"),
          document.getElementById("deviceLayerControlsCanvas")
        ].filter(Boolean);
        if (!targets.length) return;
        const obs = new MutationObserver(function () {
          lockShellGeometry();
        });
        targets.forEach(function (t) {
          obs.observe(t, { attributes: true, attributeFilter: ["style"] });
        });
        window.addEventListener("resize", lockShellGeometry, { passive: true });
      }

      function runScripts(sourceDoc) {
        const scripts = sourceDoc.querySelectorAll("script");
        scripts.forEach(function (script, index) {
          let text = script.textContent || "";
          if (!text.trim()) return;
          text = text.replace(/\bconst\s+APP_UI_CONTROLS\s*=/g, "var APP_UI_CONTROLS=");
          const node = document.createElement("script");
          node.setAttribute("data-shell-source-script", String(index));
          node.textContent = remapText(text);
          document.body.appendChild(node);
        });
      }

      function alignRuntimeControlsToShell() {
        const controls = window.APP_UI_CONTROLS;
        if (!controls) return;
        controls.top = parsePxVariable("--device-header-h", 50);
        controls.bottom = parsePxVariable("--device-footer-h", 40);
        controls.left = parsePxVariable("--controls-collapsed-w", 58);
        controls.right = parsePxVariable("--controls-collapsed-w", 58);
      }

      function dispatchTextZoom(action) {
        if (typeof window.__sentinelTextZoomAction !== "function") return false;
        window.__sentinelTextZoomAction(action);
        return true;
      }

      function syncTextZoomFromRuntime() {
        if (typeof window.__sentinelSyncTextZoomControls === "function") {
          window.__sentinelSyncTextZoomControls();
        }
      }

      function findDeviceZoomButton(action) {
        if (action === "inc") return document.querySelector('#zoomControlsStatic .zoom-inc');
        if (action === "dec") return document.querySelector('#zoomControlsStatic .zoom-dec');
        if (action === "reset") return document.querySelector('#zoomControlsStatic .zoom-reset');
        return null;
      }

      function findFullOrientationButton(orientation) {
        return document.querySelector('.orientationToggleStatic .orientation-btn[data-orientation="' + String(orientation) + '"]');
      }

      function syncMiniDeviceZoomFromFull() {
        const full = document.querySelector('[data-control="device-zoom-reset"][data-variant="full"]');
        if (!full) return;
        const value = String(full.textContent || "").trim();
        const mini = document.querySelector('[data-control="device-zoom-reset"][data-variant="mini"]');
        if (!mini) return;
        const vertical = mini.querySelector(".zoomPctVertical");
        if (vertical) {
          vertical.textContent = value;
        } else {
          mini.textContent = value;
        }
      }

      function syncMiniOrientationStateFromFull() {
        const fullButtons = document.querySelectorAll('.orientationToggleStatic .orientation-btn[data-orientation]');
        fullButtons.forEach(function (button) {
          const orientation = String(button.getAttribute("data-orientation") || "");
          if (!orientation) return;
          const active = button.classList.contains("active");
          const mini = document.querySelector('.collapsedViewControls .orientation-btn[data-orientation="' + orientation + '"]');
          if (!mini) return;
          mini.classList.toggle("active", active);
          mini.classList.toggle("orientationBtnStaticActive", active);
          mini.setAttribute("aria-pressed", active ? "true" : "false");
        });
      }

      function bindShellControls() {
        document.addEventListener("click", function (event) {
          const target = event.target && event.target.closest ? event.target.closest("[data-control]") : null;
          if (!target) return;
          const control = String(target.getAttribute("data-control") || "");
          if (!control) return;

          if (control === "device-zoom-inc") {
            const btn = findDeviceZoomButton("inc");
            if (btn && btn !== target) btn.click();
            return;
          }
          if (control === "device-zoom-dec") {
            const btn = findDeviceZoomButton("dec");
            if (btn && btn !== target) btn.click();
            return;
          }
          if (control === "device-zoom-reset") {
            const btn = findDeviceZoomButton("reset");
            if (btn && btn !== target) btn.click();
            return;
          }

          if (control === "text-zoom-inc") {
            dispatchTextZoom("inc");
            return;
          }
          if (control === "text-zoom-dec") {
            dispatchTextZoom("dec");
            return;
          }
          if (control === "text-zoom-reset") {
            dispatchTextZoom("reset");
            return;
          }

          if (control === "orientation-portrait") {
            const button = findFullOrientationButton("portrait");
            if (button && button !== target) button.click();
            return;
          }
          if (control === "orientation-landscape") {
            const button = findFullOrientationButton("landscape");
            if (button && button !== target) button.click();
          }
        });
      }

      function observeFullControlState() {
        const fullZoom = document.querySelector('[data-control="device-zoom-reset"][data-variant="full"]');
        if (fullZoom) {
          const zoomObserver = new MutationObserver(syncMiniDeviceZoomFromFull);
          zoomObserver.observe(fullZoom, { subtree: true, childList: true, characterData: true });
        }
        const orientationRoot = document.querySelector(".orientationToggleStatic");
        if (orientationRoot) {
          const orientationObserver = new MutationObserver(syncMiniOrientationStateFromFull);
          orientationObserver.observe(orientationRoot, { subtree: true, attributes: true, attributeFilter: ["class", "aria-pressed"] });
        }
      }

      function sourceUrl() {
        const sourceMeta = document.querySelector('meta[name="sentinel-shell-source"]');
        const sourceFromMeta = sourceMeta && sourceMeta.getAttribute("content");
        if (sourceFromMeta) {
          return new URL(sourceFromMeta, window.location.origin).toString();
        }
        const current = new URL(window.location.href);
        current.searchParams.set("runtime", "source");
        return current.toString();
      }

      fetch(sourceUrl(), { credentials: "same-origin" })
        .then(function (res) { return res.text(); })
        .then(function (html) {
          const sourceDoc = new DOMParser().parseFromString(html, "text/html");
          copyFilteredStyles(sourceDoc);
          copyAllowedHeadLinks(sourceDoc);
          mountTopControls(sourceDoc);
          mountOrientation(sourceDoc);
          mountZoom(sourceDoc);
          mountLayers(sourceDoc);
          mountRtiContent(sourceDoc);
          mountPopups(sourceDoc);
          installSelectorAdapter();
          runScripts(sourceDoc);
          annotateControls();
          bindShellControls();
          alignRuntimeControlsToShell();
          lockShellGeometry();
          observeShellGeometry();
          observeFullControlState();
          syncTextZoomFromRuntime();
          syncMiniDeviceZoomFromFull();
          syncMiniOrientationStateFromFull();
          if (typeof window.applyRtiLayout === "function") {
            window.applyRtiLayout();
          }
          syncTextZoomFromRuntime();
          syncMiniDeviceZoomFromFull();
          syncMiniOrientationStateFromFull();
        })
        .catch(function () {
          window.__sentinelShellRuntimeError = "shell-runtime-load-failed";
        });
    })();
  </script>
