name: CI

on:
  push:
    branches: [main, master, device_ui, codex/*]
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Regression tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: python -m unittest discover -s dev_tests/regression -p "test_*.py"
