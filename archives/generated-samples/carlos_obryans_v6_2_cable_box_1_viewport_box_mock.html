<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IST-5 (Global) - Cable Box 1 Viewport Mock</title>
  <style>
    :root { --canvas-w:480px; --canvas-h:854px; --line:#c8d4df; --button-bg:#1c5e87; --button-fg:#fff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI",Tahoma,sans-serif; background:linear-gradient(180deg,#f8fbfd,#edf3f8); color:#102534; }
    .wrap { min-height:100vh; display:grid; place-items:center; padding:18px; }
    .panel { width:min(98vw, calc(var(--canvas-w)*0.9)); background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px; box-shadow:0 14px 28px rgba(0,0,0,.1); }
    .title { margin:0 0 8px; font-size:14px; color:#415c70; }
    .viewport { width:100%; aspect-ratio:calc(var(--canvas-w)/var(--canvas-h)); border:1px solid var(--line); border-radius:8px; overflow:hidden; background:#f7fafc; }
    .canvas { position:relative; width:var(--canvas-w); height:var(--canvas-h); }
    .item { position:absolute; border-radius:8px; border:1px solid rgba(0,0,0,.16); display:grid; place-items:center; text-align:center; padding:4px; line-height:1.1; background:linear-gradient(180deg,#2372a1,var(--button-bg)); color:var(--button-fg); }
    .item.top { left:0; top:0; width:480px; height:60px; font-size:18px; }
    .item.home { left:20px; top:754px; width:440px; height:100px; font-size:10px; }
    .viewport-box {
      position:absolute;
      left:20px;
      top:60px;
      width:440px;
      height:694px;
      border:3px dashed #8aa4bb;
      border-radius:8px;
      background:rgba(138,164,187,.12);
      display:grid;
      place-items:center;
      color:#2c485d;
      font-size:28px;
      font-weight:600;
      letter-spacing:.5px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <p class="title">IST-5 (Global) - Cable Box 1</p>
      <div class="viewport">
        <div class="canvas">
          <div class="item top">Cable Box 1</div>
          <div class="viewport-box">Viewport</div>
          <div class="item home">NAV - Home</div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
