<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IST-5 (Global) - Cable Box 1</title>
  <style>
    :root {
      --canvas-w: 480px;
      --canvas-h: 854px;
      --scale: 1;
      --line: #c8d4df;
      --button-bg: #1c5e87;
      --button-fg: #fff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #f8fbfd, #edf3f8);
      color: #102534;
    }
    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .panel {
      width: min(calc(var(--canvas-w) + 22px), 96vw);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.1);
    }
    .title {
      margin: 0 0 8px;
      font-size: 14px;
      color: #415c70;
    }
    .viewport {
      width: 100%;
      aspect-ratio: calc(480 / 854);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #f7fafc;
    }
    .canvas {
      position: relative;
      width: var(--canvas-w);
      height: var(--canvas-h);
      transform-origin: top left;
    }
    .item {
      position: absolute;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.16);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 4px;
      overflow: hidden;
      line-height: 1.1;
      font-size: calc(var(--btn-fs, 12px) / var(--scale));
      cursor: pointer;
      transition: transform 120ms ease;
      background: linear-gradient(180deg, #2372a1, var(--button-bg));
      color: var(--button-fg);
      white-space: pre-line;
    }
    .item:hover { transform: translateY(-1px); }
    .item span { pointer-events: none; }
    .vp-shell {
      position: absolute;
      border: 2px dashed #89a8bf;
      border-radius: 14px;
      background: rgba(169, 193, 210, 0.25);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(11, 23, 33, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 1000;
    }
    .overlay.open { display: flex; }
    .popup {
      width: min(720px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border: 1px solid #c7d4df;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 20px 36px rgba(0, 0, 0, 0.2);
    }
    .popup h3 { margin: 0 0 10px; font-size: 16px; }
    .group { border: 1px solid #d4dee7; border-radius: 12px; padding: 10px; margin-bottom: 10px; }
    .name { font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #203544; }
    .actions { display: flex; gap: 8px; margin-bottom: 8px; }
    .actions button { border: 1px solid #a9bccd; background: #f7fbff; border-radius: 12px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
    .actions .pass.active { background: #dcf4e5; border-color: #8bc19d; }
    .actions .fail.active { background: #f9e0e0; border-color: #cf9b9b; }
    .note { width: 100%; min-height: 76px; border: 1px solid #ccd8e2; border-radius: 10px; padding: 10px; font-size: 13px; }
    .note[disabled] { background: #f4f7fa; color: #8798a7; }
    .footer { display: flex; justify-content: flex-end; }
    .close { border: 1px solid #a9bccd; background: #f7fbff; border-radius: 12px; padding: 8px 18px; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <p class="title">IST-5 (Global) - Cable Box 1</p>
      <div class="viewport" id="viewport">
        <div class="canvas" id="canvas"></div>
      </div>
    </section>
  </div>

  <div class="overlay" id="overlay">
    <div class="popup">
      <h3 id="pTitle">Screen Button Test</h3>
      <div id="pRows"></div>
      <div class="footer"><button class="close" id="pClose">Close</button></div>
    </div>
  </div>

  <script>
    (() => {
      // JSON-backed payload from project_structure_user_facing_Carlos-OBryans-v6.2-Caseta-Driver.json
      const page = {
        pageName: "Cable Box 1",
        buttonCategories: {
          screenLabels: [
            {
              buttonIdentity: { buttonTagName: null, text: "Cable Box 1" },
              buttonUI: { fontSize: 18, coordinates: { top: 0, left: 0, height: 60, width: 480 } },
              testTargets: {
                text: true,
                macro: false,
                variables: { Reversed: false, Inactive: false, Visible: false, Value: false, State: false, Command: false },
                textVariable: false,
                pageLink: false
              }
            }
          ],
          screenButtons: [
            {
              buttonIdentity: { buttonTagName: "NAV - Home", text: "" },
              buttonUI: { fontSize: 10, coordinates: { top: 754, left: 20, height: 100, width: 440 } },
              testTargets: {
                text: false,
                macro: false,
                variables: { Reversed: false, Inactive: false, Visible: false, Value: false, State: false, Command: false },
                textVariable: false,
                pageLink: true
              }
            }
          ],
          hardButtons: []
        },
        viewports: [
          {
            viewportIdentity: { viewportButtonId: 156 },
            viewportUI: { coordinates: { top: 60, left: 20, height: 694, width: 440 } },
            frames: []
          }
        ]
      };

      const canvasW = 480;
      const canvasH = 854;
      const varsOff = { Reversed: false, Inactive: false, Visible: false, Value: false, State: false, Command: false };

      const viewportEl = document.getElementById("viewport");
      const canvas = document.getElementById("canvas");
      const overlay = document.getElementById("overlay");
      const pTitle = document.getElementById("pTitle");
      const pRows = document.getElementById("pRows");
      const pClose = document.getElementById("pClose");
      const state = new Map();
      let currentKey = "";
      let currentMeta = null;

      const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;" }[c]));

      function displayText(identity) {
        const txt = String(identity?.text || "");
        const tag = String(identity?.buttonTagName || "");
        return txt.trim() !== "" ? txt : tag;
      }

      function targetsFor(btn) {
        const t = btn.testTargets || {};
        const out = [];
        if (t.text) out.push("Text");
        if (t.macro) out.push("Macro");
        const v = Object.assign({}, varsOff, t.variables || {});
        if (v.Reversed) out.push("Variable Reversed");
        if (v.Inactive) out.push("Variable Inactive");
        if (v.Visible) out.push("Variable Visible");
        if (v.Value) out.push("Variable Value");
        if (v.State) out.push("Variable State");
        if (v.Command) out.push("Variable Command");
        if (t.textVariable) out.push("TextVariable");
        if (t.pageLink) out.push("PageLink");
        return out;
      }

      function addButton(btn, categoryTitle) {
        const ui = btn.buttonUI || {};
        const c = ui.coordinates || {};
        const el = document.createElement("button");
        el.className = "item";
        el.style.left = `${Number(c.left || 0)}px`;
        el.style.top = `${Number(c.top || 0)}px`;
        el.style.width = `${Number(c.width || 0)}px`;
        el.style.height = `${Number(c.height || 0)}px`;
        el.style.setProperty("--btn-fs", `${Number(ui.fontSize || 10)}px`);

        const meta = {
          categoryTitle,
          tag: String(btn.buttonIdentity?.buttonTagName || ""),
          text: String(btn.buttonIdentity?.text || ""),
          targets: targetsFor(btn)
        };

        el.dataset.meta = JSON.stringify(meta);
        const span = document.createElement("span");
        span.textContent = displayText(btn.buttonIdentity);
        el.appendChild(span);
        el.addEventListener("click", () => openPopup(meta));
        canvas.appendChild(el);
      }

      function renderPage() {
        canvas.innerHTML = "";
        const cats = page.buttonCategories || {};
        (cats.screenLabels || []).forEach((b) => addButton(b, "Screen Label"));
        (cats.screenButtons || []).forEach((b) => addButton(b, "Screen Button"));
        (cats.hardButtons || []).forEach((b) => addButton(b, "Hard Button"));

        // Intentionally render only the viewport container (no viewport frame buttons).
        (page.viewports || []).forEach((vp) => {
          const c = vp.viewportUI?.coordinates || {};
          const box = document.createElement("div");
          box.className = "vp-shell";
          box.style.left = `${Number(c.left || 0)}px`;
          box.style.top = `${Number(c.top || 0)}px`;
          box.style.width = `${Number(c.width || 0)}px`;
          box.style.height = `${Number(c.height || 0)}px`;
          canvas.appendChild(box);
        });
      }

      function fitCanvas() {
        const scale = Math.min(viewportEl.clientWidth / canvasW, viewportEl.clientHeight / canvasH);
        canvas.style.transform = `scale(${scale})`;
        document.documentElement.style.setProperty("--scale", String(scale || 1));
      }

      function rowHtml(name, key, rec) {
        const r = rec || { status: "", note: "" };
        const disabled = r.status !== "fail" ? "disabled" : "";
        return `<div class="group" data-key="${esc(key)}"><div class="name">${esc(name)}</div><div class="actions"><button class="pass ${r.status === "pass" ? "active" : ""}" data-action="pass">Pass</button><button class="fail ${r.status === "fail" ? "active" : ""}" data-action="fail">Fail</button></div><textarea class="note" placeholder="Fail note" ${disabled}>${esc(r.note)}</textarea></div>`;
      }

      function renderPopup() {
        if (!currentMeta) return;
        const key = `${currentMeta.tag}|${currentMeta.text}`;
        const saved = state.get(key) || {};
        const identity = String(currentMeta.text || currentMeta.tag || "").trim();
        pTitle.textContent = `${currentMeta.categoryTitle} Test${identity ? ` - ${identity}` : ""}`;
        const rows = (currentMeta.targets || []).map((t) => rowHtml(t, t, saved[t]));
        pRows.innerHTML = rows.length ? rows.join("") : '<div class="group"><div class="name">No true test targets.</div></div>';
      }

      function openPopup(meta) {
        currentMeta = meta;
        currentKey = `${meta.tag}|${meta.text}`;
        renderPopup();
        overlay.classList.add("open");
      }

      function closePopup() {
        overlay.classList.remove("open");
      }

      pRows.addEventListener("click", (e) => {
        const b = e.target.closest("button[data-action]");
        if (!b || !currentKey) return;
        const row = b.closest(".group");
        const targetKey = row.dataset.key;
        const action = b.dataset.action;
        const recs = state.get(currentKey) || {};
        recs[targetKey] = recs[targetKey] || { status: "", note: "" };
        recs[targetKey].status = action;
        if (action !== "fail") recs[targetKey].note = "";
        state.set(currentKey, recs);
        renderPopup();
      });

      pRows.addEventListener("input", (e) => {
        if (!e.target.classList.contains("note") || !currentKey) return;
        const row = e.target.closest(".group");
        const targetKey = row.dataset.key;
        const recs = state.get(currentKey) || {};
        recs[targetKey] = recs[targetKey] || { status: "", note: "" };
        recs[targetKey].note = e.target.value;
        state.set(currentKey, recs);
      });

      pClose.addEventListener("click", closePopup);
      overlay.addEventListener("click", (e) => { if (e.target === overlay) closePopup(); });
      window.addEventListener("keydown", (e) => { if (e.key === "Escape") closePopup(); });

      renderPage();
      fitCanvas();
      window.addEventListener("resize", fitCanvas);
    })();
  </script>
</body>
</html>
