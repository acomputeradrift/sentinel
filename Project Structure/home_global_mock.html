<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home (Global) Mock Layout</title>
  <style>
    :root {
      --canvas-w: 1242px;
      --canvas-h: 2440px;
      --bg: #f2f5f8;
      --panel: #ffffff;
      --label: #2f4f60;
      --button: #144e75;
      --button-text: #ffffff;
      --line: #c4d2dd;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% 20%, #e9eff4, var(--bg));
      color: #10202c;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }
    .wrap { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .panel {
      width: min(98vw, calc(var(--canvas-w) * 0.55));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .title { margin: 0 0 8px; font-size: 14px; color: #3f5565; }
    .viewport {
      width: 100%;
      aspect-ratio: calc(var(--canvas-w) / var(--canvas-h));
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: linear-gradient(180deg, #f9fbfd, #eef3f8);
    }
    .canvas { position: relative; width: var(--canvas-w); height: var(--canvas-h); transform-origin: top left; }
    .item {
      position: absolute;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,0.15);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 4px;
      overflow: hidden;
      line-height: 1.1;
      font-size: 12px;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
    }
    .item:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .item span { pointer-events: none; }
    .label { background: rgba(20,78,117,0.08); color: var(--label); border-style: dashed; }
    .button { background: linear-gradient(180deg, #1f678f, var(--button)); color: var(--button-text); border-color: rgba(255,255,255,0.3); }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(12, 23, 33, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }
    .overlay.open { display: flex; }
    .popup {
      width: min(560px, 100%);
      max-height: 85vh;
      overflow: auto;
      background: #fff;
      border-radius: 10px;
      border: 1px solid #c3d1db;
      box-shadow: 0 18px 36px rgba(0,0,0,0.2);
      padding: 12px;
    }
    .popup h3 { margin: 0 0 8px; font-size: 14px; }
    .muted { font-size: 12px; color: #5a6d7b; margin-bottom: 10px; }
    .target-row { border: 1px solid #d5e0e8; border-radius: 8px; padding: 8px; margin-bottom: 8px; }
    .target-name { font-weight: 600; font-size: 13px; margin-bottom: 6px; }
    .actions { display: flex; gap: 6px; margin-bottom: 6px; }
    .actions button {
      border: 1px solid #b9c8d5;
      background: #f7fbff;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .actions button.active-pass { background: #daf2e3; border-color: #8cc49f; }
    .actions button.active-fail { background: #f9dede; border-color: #d19292; }
    .note { width: 100%; min-height: 56px; border: 1px solid #ccd8e2; border-radius: 6px; padding: 6px; font-size: 12px; }
    .note[disabled] { background: #f5f7f9; color: #8a99a6; }
    .popup-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
    .popup-footer button { border: 1px solid #b9c8d5; background: #f7fbff; border-radius: 6px; padding: 6px 10px; cursor: pointer; }
  </style>
</head>

          <button class="item button" style="left:260px;top:1638px;width:230px;height:40px" data-meta='{&quot;tag&quot;: &quot;DSPL - Room 2 Status&quot;, &quot;text&quot;: &quot;$%TAG!DSPL - Room 2 Status%$&quot;, &quot;targets&quot;: [&quot;Text&quot;, &quot;TextVariable&quot;]}' aria-label="$%TAG!DSPL - Room 2 Status%$"><span>$%TAG!DSPL - Room 2 Status%$</span></button>
          <button class="item button" style="left:15px;top:1638px;width:230px;height:40px" data-meta='{&quot;tag&quot;: &quot;DSPL - Room 1 Status&quot;, &quot;text&quot;: &quot;$%TAG!DSPL - Room 1 Status%$&quot;, &quot;targets&quot;: [&quot;Text&quot;, &quot;TextVariable&quot;]}' aria-label="$%TAG!DSPL - Room 1 Status%$"><span>$%TAG!DSPL - Room 1 Status%$</span></button>
          <button class="item button" style="left:505px;top:1638px;width:230px;height:40px" data-meta='{&quot;tag&quot;: &quot;DSPL - Room 3 Status&quot;, &quot;text&quot;: &quot;$%TAG!DSPL - Room 3 Status%$&quot;, &quot;targets&quot;: [&quot;Text&quot;, &quot;TextVariable&quot;]}' aria-label="$%TAG!DSPL - Room 3 Status%$"><span>$%TAG!DSPL - Room 3 Status%$</span></button>
          <button class="item button" style="left:750px;top:1638px;width:230px;height:40px" data-meta='{&quot;tag&quot;: &quot;DSPL - Room 4 Status&quot;, &quot;text&quot;: &quot;$%TAG!DSPL - Room 4 Status%$&quot;, &quot;targets&quot;: [&quot;Text&quot;, &quot;TextVariable&quot;]}' aria-label="$%TAG!DSPL - Room 4 Status%$"><span>$%TAG!DSPL - Room 4 Status%$</span></button>
          <button class="item button" style="left:995px;top:1638px;width:230px;height:40px" data-meta='{&quot;tag&quot;: &quot;DSPL - Room 5 Status&quot;, &quot;text&quot;: &quot;$%TAG!DSPL - Room 5 Status%$&quot;, &quot;targets&quot;: [&quot;Text&quot;, &quot;TextVariable&quot;]}' aria-label="$%TAG!DSPL - Room 5 Status%$"><span>$%TAG!DSPL - Room 5 Status%$</span></button>
        </div>
      </div>
    </section>
  </div>

  <div class="overlay" id="overlay">
    <div class="popup" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
      <h3 id="popupTitle">Button Test Targets</h3>
      <div class="muted" id="popupMeta"></div>
      <div id="targetsContainer"></div>
      <div class="popup-footer">
        <button id="closeBtn" type="button">Close</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const viewport = document.getElementById('viewport');
      const canvas = document.getElementById('canvas');
      const overlay = document.getElementById('overlay');
      const popupMeta = document.getElementById('popupMeta');
      const targetsContainer = document.getElementById('targetsContainer');
      const closeBtn = document.getElementById('closeBtn');
      const w = 1242;
      const h = 2440;
      let currentKey = '';
      const store = new Map();

      function fit() {
        const scale = Math.min(viewport.clientWidth / w, viewport.clientHeight / h);
        canvas.style.transform = `scale(${scale})`;
      }

      function esc(s) {
        return String(s ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
      }

      function rowHtml(target, state) {
        const status = state?.status || '';
        const note = state?.note || '';
        const failDisabled = status !== 'fail' ? 'disabled' : '';
        return `
          <div class="target-row" data-target="${esc(target)}">
            <div class="target-name">${esc(target)}</div>
            <div class="actions">
              <button type="button" data-action="pass" class="${status==='pass' ? 'active-pass' : ''}">Pass</button>
              <button type="button" data-action="fail" class="${status==='fail' ? 'active-fail' : ''}">Fail</button>
            </div>
            <textarea class="note" placeholder="Fail note" ${failDisabled}>${esc(note)}</textarea>
          </div>
        `;
      }

      function renderPopup(meta) {
        const key = `${meta.tag}|${meta.text}`;
        currentKey = key;
        const saved = store.get(key) || {};
        popupMeta.textContent = `Tag: ${meta.tag || '(none)'} | Text: ${meta.text || '(none)'}`;
        const targets = meta.targets || [];
        targetsContainer.innerHTML = targets.length
          ? targets.map(t => rowHtml(t, saved[t])).join('')
          : '<div class="muted">No true test targets for this item.</div>';
      }

      function openPopup(meta) {
        renderPopup(meta);
        overlay.classList.add('open');
      }

      function closePopup() {
        overlay.classList.remove('open');
      }

      canvas.querySelectorAll('.item').forEach(el => {
        el.addEventListener('click', () => {
          const meta = JSON.parse(el.dataset.meta);
          openPopup(meta);
        });
      });

      targetsContainer.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn || !currentKey) return;
        const row = btn.closest('.target-row');
        const target = row.dataset.target;
        const action = btn.dataset.action;
        const keyData = store.get(currentKey) || {};
        keyData[target] = keyData[target] || {status:'',note:''};
        keyData[target].status = action;
        if (action !== 'fail') keyData[target].note = '';
        store.set(currentKey, keyData);
        const meta = popupMeta.textContent;
        const [tagPart,textPart] = meta.replace('Tag: ','').split(' | Text: ');
        const targets = [...targetsContainer.querySelectorAll('.target-row')].map(r => r.dataset.target);
        renderPopup({tag:tagPart==='(none)'?'':tagPart, text:textPart==='(none)'?'':textPart, targets});
      });

      targetsContainer.addEventListener('input', (e) => {
        if (!e.target.classList.contains('note') || !currentKey) return;
        const row = e.target.closest('.target-row');
        const target = row.dataset.target;
        const keyData = store.get(currentKey) || {};
        keyData[target] = keyData[target] || {status:'',note:''};
        keyData[target].note = e.target.value;
        store.set(currentKey, keyData);
      });

      closeBtn.addEventListener('click', closePopup);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) closePopup(); });
      window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePopup(); });

      fit();
      window.addEventListener('resize', fit);
    })();
  </script>
</body>
</html>
