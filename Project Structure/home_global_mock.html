<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home (Global) Mock Layout</title>
  <style>
    :root { --canvas-w:1242px; --canvas-h:2440px; --bg:#f3f6f9; --panel:#fff; --line:#c8d4df; --label-bg:#e8eff6; --label-fg:#2f4d62; --button-bg:#1c5e87; --button-fg:#fff; --hard-bg:#0e3b57; --scale:1; }
    * { box-sizing:border-box; } body { margin:0; font-family:"Segoe UI",Tahoma,sans-serif; background:linear-gradient(180deg,#f8fbfd,#edf3f8); color:#102534; }
    .wrap { min-height:100vh; display:grid; place-items:center; padding:18px; }
    .panel { width:min(98vw, calc(var(--canvas-w)*0.56)); background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:10px; box-shadow:0 14px 28px rgba(0,0,0,.1); }
    .title { margin:0 0 8px; font-size:14px; color:#415c70; }
    .viewport { width:100%; aspect-ratio:calc(var(--canvas-w)/var(--canvas-h)); border:1px solid var(--line); border-radius:8px; overflow:hidden; background:#f7fafc; }
    .canvas { position:relative; width:var(--canvas-w); height:var(--canvas-h); transform-origin:top left; }
    .item { position:absolute; border-radius:8px; border:1px solid rgba(0,0,0,.16); display:grid; place-items:center; text-align:center; padding:4px; overflow:hidden; line-height:1.1; font-size:calc(var(--btn-fs, 16px) / var(--scale)); cursor:pointer; transition:transform 120ms ease; }
    .item:hover { transform:translateY(-1px); } .item span { pointer-events:none; }
    .label { background:linear-gradient(180deg,#2372a1,var(--button-bg)); color:var(--button-fg); border-style:solid; } .button { background:linear-gradient(180deg,#2372a1,var(--button-bg)); color:var(--button-fg); } .hard { background:linear-gradient(180deg,#1c4f71,var(--hard-bg)); color:#fff; }
    .overlay { position:fixed; inset:0; background:rgba(11,23,33,.55); display:none; align-items:center; justify-content:center; padding:14px; z-index:1000; } .overlay.open { display:flex; }
    .popup { width:min(720px,100%); max-height:88vh; overflow:auto; background:#fff; border:1px solid #c7d4df; border-radius:10px; padding:12px; box-shadow:0 20px 36px rgba(0,0,0,.2); }
    .popup h3 { margin:0 0 10px; font-size:16px; }
    .group { border:1px solid #d4dee7; border-radius:12px; padding:10px; margin-bottom:10px; }
    .row { border:1px solid #d4dee7; border-radius:8px; padding:8px; margin-bottom:8px; }
    .name { font-weight:600; font-size:14px; margin-bottom:6px; color:#203544; }
    .actions { display:flex; gap:8px; margin-bottom:8px; }
    .actions button { border:1px solid #a9bccd; background:#f7fbff; border-radius:12px; padding:6px 16px; font-size:13px; cursor:pointer; }
    .actions .pass.active { background:#dcf4e5; border-color:#8bc19d; } .actions .fail.active { background:#f9e0e0; border-color:#cf9b9b; }
    .note { width:100%; min-height:76px; border:1px solid #ccd8e2; border-radius:10px; padding:10px; font-size:13px; } .note[disabled] { background:#f4f7fa; color:#8798a7; }
    .footer { display:flex; justify-content:flex-end; } .close { border:1px solid #a9bccd; background:#f7fbff; border-radius:12px; padding:8px 18px; cursor:pointer; font-size:13px; }

egory&quot;: &quot;screenButtons&quot;, &quot;categoryTitle&quot;: &quot;Screen Button&quot;, &quot;tag&quot;: &quot;Activity: Video Source&quot;, &quot;text&quot;: &quot;$%TAG!Activity: Video Source%$&quot;, &quot;targets&quot;: [&quot;Text&quot;, &quot;Macro&quot;, &quot;Variable:Reversed&quot;, &quot;TextVariable&quot;]}'><span>$%TAG!Activity: Video Source%$</span></button><button class="item button" style="left:862px;top:1143px;width:380px;height:160px;--btn-fs:12px" data-meta='{&quot;category&quot;: &quot;screenButtons&quot;, &quot;categoryTitle&quot;: &quot;Screen Button&quot;, &quot;tag&quot;: &quot;Activity: Audio Source (Global)&quot;, &quot;text&quot;: &quot;$%TAG!Activity: Audio Source (Global)%$&quot;, &quot;targets&quot;: [&quot;Text&quot;, &quot;Macro&quot;, &quot;Variable:Reversed&quot;, &quot;TextVariable&quot;]}'><span>$%TAG!Activity: Audio Source (Global)%$</span></button><button class="item button" style="left:862px;top:1325px;width:380px;height:160px;--btn-fs:12px" data-meta='{&quot;category&quot;: &quot;screenButtons&quot;, &quot;categoryTitle&quot;: &quot;Screen Button&quot;, &quot;tag&quot;: &quot;Activity: Video Source (Global)&quot;, &quot;text&quot;: &quot;$%TAG!Activity: Video Source (Global)%$&quot;, &quot;targets&quot;: [&quot;Text&quot;, &quot;Macro&quot;, &quot;Variable:Reversed&quot;, &quot;TextVariable&quot;]}'><span>$%TAG!Activity: Video Source (Global)%$</span></button><button class="item button" style="left:861px;top:415px;width:380px;height:160px;--btn-fs:12px" data-meta='{&quot;category&quot;: &quot;screenButtons&quot;, &quot;categoryTitle&quot;: &quot;Screen Button&quot;, &quot;tag&quot;: &quot;Activity: Home&quot;, &quot;text&quot;: &quot;$%TAG!Activity: Home%$&quot;, &quot;targets&quot;: [&quot;Text&quot;, &quot;Macro&quot;, &quot;Variable:Reversed&quot;, &quot;TextVariable&quot;]}'><span>$%TAG!Activity: Home%$</span></button><button class="item button" style="left:862px;top:961px;width:380px;height:160px;--btn-fs:12px" data-meta='{&quot;category&quot;: &quot;screenButtons&quot;, &quot;categoryTitle&quot;: &quot;Screen Button&quot;, &quot;tag&quot;: &quot;Activity: Other Source&quot;, &quot;text&quot;: &quot;$%TAG!Activity: Other Source%$&quot;, &quot;targets&quot;: [&quot;Text&quot;, &quot;Macro&quot;, &quot;Variable:Reversed&quot;, &quot;TextVariable&quot;]}'><span>$%TAG!Activity: Other Source%$</span></button></div></div></section></div>

  <div class="overlay" id="overlay"><div class="popup"><h3 id="pTitle">Screen Button Test</h3><div id="pRows"></div><div class="footer"><button class="close" id="pClose">Close</button></div></div></div>

  <script>
    (function(){
      const viewport=document.getElementById('viewport'), canvas=document.getElementById('canvas'), overlay=document.getElementById('overlay'), pRows=document.getElementById('pRows'), pClose=document.getElementById('pClose'), pTitle=document.getElementById('pTitle');
      const W=1242, H=2440;
      const state=new Map(); let currentKey='', currentMeta=null;

      function fit(){
        const s=Math.min(viewport.clientWidth/W, viewport.clientHeight/H);
        canvas.style.transform=`scale(${s})`;
        document.documentElement.style.setProperty('--scale', String(s || 1));
      }
      function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

      function rowHtml(name, recKey, rec){
        const r=rec||{status:'',note:''};
        const dis=r.status!=='fail'?'disabled':'';
        return `<div class="row" data-key="${esc(recKey)}"><div class="name">${esc(name)}</div><div class="actions"><button class="pass ${r.status==='pass'?'active':''}" data-action="pass">Pass</button><button class="fail ${r.status==='fail'?'active':''}" data-action="fail">Fail</button></div><textarea class="note" placeholder="Fail note" ${dis}>${esc(r.note)}</textarea></div>`;
      }

      function render(){
        if(!currentMeta) return;
        const m=currentMeta;
        const key=`${m.tag}|${m.text}`;
        const saved=state.get(key)||{};
        pTitle.textContent = `${m.categoryTitle || 'Screen Button'} Test`;

        const rows=[];
        for(const t of (m.targets||[])){
          const recKey=t;
          const display=t.startsWith('Variable:') ? t.replace('Variable:','Variable ') : t;
          rows.push(rowHtml(display, recKey, saved[recKey]));
        }
        pRows.innerHTML=rows.length ? rows.join('') : '<div class="group"><div class="name">No true test targets.</div></div>';
      }

      function open(meta){
        const sanitized={...meta};
        const hasTag=!!(sanitized.tag && String(sanitized.tag).trim());
        const textRaw=String(sanitized.text||'');
        const isTagOnly=/^\s*\$%TAG![^%]+%\$\s*$/.test(textRaw);
        let targets=(sanitized.targets||[]).filter(t=>hasTag || t!=='Macro');
        if(isTagOnly){
          targets=targets.filter(t=>t!=='Text');
          if(!targets.includes('TextVariable')) targets.push('TextVariable');
        }
        sanitized.targets=targets;
        currentMeta=sanitized;
        currentKey=`${sanitized.tag}|${sanitized.text}`;
        render();
        overlay.classList.add('open');
      }
      function close(){overlay.classList.remove('open');}

      canvas.querySelectorAll('.item').forEach(el=>el.addEventListener('click',()=>open(JSON.parse(el.dataset.meta))));

      pRows.addEventListener('click',e=>{
        const b=e.target.closest('button[data-action]'); if(!b||!currentKey) return;
        const row=b.closest('.row'); const k=row.dataset.key; const a=b.dataset.action;
        const recs=state.get(currentKey)||{}; recs[k]=recs[k]||{status:'',note:''}; recs[k].status=a; if(a!=='fail') recs[k].note='';
        state.set(currentKey,recs); render();
      });

      pRows.addEventListener('input',e=>{
        if(!e.target.classList.contains('note')||!currentKey) return;
        const row=e.target.closest('.row'); const k=row.dataset.key;
        const recs=state.get(currentKey)||{}; recs[k]=recs[k]||{status:'',note:''}; recs[k].note=e.target.value; state.set(currentKey,recs);
      });

      pClose.addEventListener('click',close);
      overlay.addEventListener('click',e=>{if(e.target===overlay) close();});
      window.addEventListener('keydown',e=>{if(e.key==='Escape') close();});

      fit(); window.addEventListener('resize',fit);
    })();
  </script>
