    .canvas { position:relative; width:var(--canvas-w); height:var(--canvas-h); transform-origin:top left; }
    .item { position:absolute; border-radius:8px; border:1px solid rgba(0,0,0,.16); display:grid; place-items:center; text-align:center; padding:4px; overflow:hidden; line-height:1.1; font-size:calc(var(--btn-fs,10px)/var(--scale)); background:linear-gradient(180deg,#2372a1,var(--button-bg)); color:var(--button-fg); white-space:pre-line; cursor:pointer; }

    .vp-shell { position:absolute; border:2px dashed #89a8bf; border-radius:14px; background:rgba(169,193,210,.25); }
    .vp-nav { width:48px; height:48px; border-radius:16px; border:3px solid var(--accent); background:transparent; color:#344b5d; font-size:20px; display:grid; place-items:center; cursor:pointer; user-select:none; }
    .vp-nav:disabled { opacity:.35; cursor:default; }
    .vp-prev { grid-area:vprev; justify-self:center; } .vp-next { grid-area:vnext; justify-self:center; }
    .vp-indicator { grid-area:vind; justify-self:center; display:flex; gap:8px; min-height:14px; }
    .dot { width:10px; height:10px; border-radius:50%; border:1px solid #9fb4c6; background:#e2ebf2; } .dot.active { background:#2d5f81; border-color:#2d5f81; }
    .overlay { position:fixed; inset:0; background:rgba(11,23,33,.55); display:none; align-items:center; justify-content:center; padding:14px; z-index:1000; }
    .overlay.open { display:flex; }
    .popup { width:min(720px,100%); max-height:88vh; overflow:auto; background:#fff; border:1px solid #c7d4df; border-radius:10px; padding:12px; box-shadow:0 20px 36px rgba(0,0,0,.2); }
    .popup h3 { margin:0 0 10px; font-size:16px; }
    .group { border:1px solid #d4dee7; border-radius:12px; padding:10px; margin-bottom:10px; }
    .name { font-weight:600; font-size:14px; margin-bottom:6px; color:#203544; }
    .actions { display:flex; gap:8px; margin-bottom:8px; }
    .actions button { border:1px solid #a9bccd; background:#f7fbff; border-radius:12px; padding:6px 16px; font-size:13px; cursor:pointer; }
    .actions .pass.active { background:#dcf4e5; border-color:#8bc19d; } .actions .fail.active { background:#f9e0e0; border-color:#cf9b9b; }
    .note { width:100%; min-height:76px; border:1px solid #ccd8e2; border-radius:10px; padding:10px; font-size:13px; } .note[disabled] { background:#f4f7fa; color:#8798a7; }
    .footer { display:flex; justify-content:flex-end; } .close { border:1px solid #a9bccd; background:#f7fbff; border-radius:12px; padding:8px 18px; cursor:pointer; font-size:13px; }

      el.dataset.meta=JSON.stringify(meta); const span=document.createElement('span'); span.textContent=displayText(btn.buttonIdentity); el.appendChild(span); el.addEventListener('click',()=>openPopup(meta)); canvas.appendChild(el);
    }
    function renderViewportShell() { if(!appUi.viewportPresentation.showViewportContainer || !viewportModel) return; const c=viewportModel.viewportUI?.coordinates||{}; const box=document.createElement('div'); box.className='vp-shell'; box.style.left=`${Number(c.left||0)}px`; box.style.top=`${Number(c.top||0)}px`; box.style.width=`${Number(c.width||0)}px`; box.style.height=`${Number(c.height||0)}px`; canvas.appendChild(box); }
    function renderViewportFrameButtons() { if(!viewportModel) return; const frame=viewportModel.frames.find(f=>f.frameId===activeFrameId)||viewportModel.frames[0]; if(!frame) return; const c=viewportModel.viewportUI?.coordinates||{}; const cats=frame.buttonCategories||{}; (cats.screenLabels||[]).forEach(b=>addButton(b,'Screen Label',c.left||0,c.top||0)); (cats.screenButtons||[]).forEach(b=>addButton(b,'Screen Button',c.left||0,c.top||0)); (cats.hardButtons||[]).forEach(b=>addButton(b,'Hard Button',c.left||0,c.top||0)); }
    function renderPageInsideRtiBox() { canvas.innerHTML=''; const cats=page.buttonCategories||{}; (cats.screenLabels||[]).forEach(b=>addButton(b,'Screen Label')); (cats.screenButtons||[]).forEach(b=>addButton(b,'Screen Button')); (cats.hardButtons||[]).forEach(b=>addButton(b,'Hard Button')); renderViewportShell(); renderViewportFrameButtons(); }
    function setHeader() { if(!appUi.header.enabled) { headerTitle.style.display='none'; return; } headerTitle.textContent=fillTemplate(appUi.header.titleTemplate, {deviceName: projectData.deviceName, pageName: page.pageName}); }
    function setNavState() { if(!appUi.viewportNavigation.enabled || !viewportModel) { vpPrevBtn.style.display='none'; vpNextBtn.style.display='none'; vpIndicator.style.display='none'; return; } const idx=viewportModel.frames.findIndex(f=>f.frameId===activeFrameId); const last=viewportModel.frames.length-1; vpPrevBtn.disabled=!appUi.viewportNavigation.behavior.wrapFrames && idx<=0; vpNextBtn.disabled=!appUi.viewportNavigation.behavior.wrapFrames && idx>=last; vpIndicator.innerHTML=''; viewportModel.frames.forEach(f=>{ const d=document.createElement('span'); d.className=`dot${f.frameId===activeFrameId?' active':''}`; vpIndicator.appendChild(d); }); }
    function stepFrame(d) { if(!viewportModel) return; const idx=viewportModel.frames.findIndex(f=>f.frameId===activeFrameId); if(idx<0) return; const n=idx+d; if(appUi.viewportNavigation.behavior.wrapFrames) { const c=viewportModel.frames.length; activeFrameId=viewportModel.frames[(n+c)%c].frameId; } else { if(n<0||n>=viewportModel.frames.length) return; activeFrameId=viewportModel.frames[n].frameId; } renderPageInsideRtiBox(); setNavState(); }
    function fitCanvas() { let s=Math.min(viewportEl.clientWidth/canvasW, viewportEl.clientHeight/canvasH); s=Math.min(s, Number(appUi.rendering.rtiCanvas.maxScale||1)); s=Math.max(s, Number(appUi.rendering.rtiCanvas.minScale||0.25)); canvas.style.transform=`scale(${s})`; document.documentElement.style.setProperty('--scale', String(s||1)); }
    function rowHtml(name,key,rec) { const r=rec||{status:'',note:''}; const dis=r.status!=='fail'?'disabled':''; return `<div class="group" data-key="${esc(key)}"><div class="name">${esc(name)}</div><div class="actions"><button class="pass ${r.status==='pass'?'active':''}" data-action="pass">Pass</button><button class="fail ${r.status==='fail'?'active':''}" data-action="fail">Fail</button></div><textarea class="note" placeholder="Fail note" ${dis}>${esc(r.note)}</textarea></div>`; }
    function renderPopup() { if(!currentMeta) return; const key=`${currentMeta.tag}|${currentMeta.text}`; const saved=state.get(key)||{}; const identity=String(currentMeta.text||currentMeta.tag||'').trim(); const typeSuffix=(appUi.testingPopup.includeButtonTypeInTitle && currentMeta.buttonType) ? ` (${currentMeta.buttonType})` : ''; pTitle.textContent=fillTemplate(appUi.testingPopup.titleTemplate, {category: currentMeta.categoryTitle, identity})+typeSuffix; const rows=(currentMeta.targets||[]).map(t=>rowHtml(t,t,saved[t])); pRows.innerHTML=rows.length?rows.join(''):'<div class="group"><div class="name">No true test targets.</div></div>'; }
    function openPopup(m) { if(!appUi.testingPopup.enabled) return; currentMeta=m; currentKey=`${m.tag}|${m.text}`; renderPopup(); overlay.classList.add('open'); }
    function closePopup() { overlay.classList.remove('open'); }
    pRows.addEventListener('click',e=>{ const b=e.target.closest('button[data-action]'); if(!b||!currentKey) return; const row=b.closest('.group'); const k=row.dataset.key; const a=b.dataset.action; const recs=state.get(currentKey)||{}; recs[k]=recs[k]||{status:'',note:''}; recs[k].status=a; if(a!=='fail') recs[k].note=''; state.set(currentKey,recs); renderPopup(); });
    pRows.addEventListener('input',e=>{ if(!e.target.classList.contains('note')||!currentKey) return; const row=e.target.closest('.group'); const k=row.dataset.key; const recs=state.get(currentKey)||{}; recs[k]=recs[k]||{status:'',note:''}; recs[k].note=e.target.value; state.set(currentKey,recs); });
    vpPrevBtn.addEventListener('click',()=>stepFrame(-1)); vpNextBtn.addEventListener('click',()=>stepFrame(1)); pClose.addEventListener('click',closePopup); overlay.addEventListener('click',e=>{if(e.target===overlay) closePopup();}); window.addEventListener('keydown',e=>{if(e.key==='Escape') closePopup();});
    setHeader(); renderPageInsideRtiBox(); setNavState(); fitCanvas(); window.addEventListener('resize', fitCanvas);
  })();
  </script>
</body></html>
