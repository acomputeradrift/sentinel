  <style>
    :root { --canvas-w:480px; --canvas-h:854px; --scale:1; --line:#c8d4df; --button-bg:#1c5e87; --button-fg:#fff; --hard-bg:#0e3b57; }
    * { box-sizing:border-box; } body { margin:0; font-family:"Segoe UI",Tahoma,sans-serif; background:linear-gradient(180deg,#f8fbfd,#edf3f8); color:#102534; }
    .wrap { min-height:100vh; display:grid; place-items:center; padding:18px; }
    .panel { width:min(98vw, calc(var(--canvas-w)*0.56)); background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px; box-shadow:0 14px 28px rgba(0,0,0,.1); }
    .title { margin:0 0 8px; font-size:14px; color:#415c70; }
    .viewport { width:100%; aspect-ratio:calc(var(--canvas-w)/var(--canvas-h)); border:1px solid var(--line); border-radius:8px; overflow:hidden; background:#f7fafc; }
    .canvas { position:relative; width:var(--canvas-w); height:var(--canvas-h); transform-origin:top left; }
    .item { position:absolute; border-radius:8px; border:1px solid rgba(0,0,0,.16); display:grid; place-items:center; text-align:center; padding:4px; overflow:hidden; line-height:1.1; font-size:calc(var(--btn-fs, 16px) / var(--scale)); cursor:pointer; transition:transform 120ms ease; }
    .item:hover { transform:translateY(-1px); } .item span { pointer-events:none; }
    .button { background:linear-gradient(180deg,#2372a1,var(--button-bg)); color:var(--button-fg); border-style:solid; } .hard { background:linear-gradient(180deg,#1c4f71,var(--hard-bg)); color:#fff; }
    .overlay { position:fixed; inset:0; background:rgba(11,23,33,.55); display:none; align-items:center; justify-content:center; padding:14px; z-index:1000; } .overlay.open { display:flex; }
    .popup { width:min(720px,100%); max-height:88vh; overflow:auto; background:#fff; border:1px solid #c7d4df; border-radius:10px; padding:12px; box-shadow:0 20px 36px rgba(0,0,0,.2); }
    .popup h3 { margin:0 0 10px; font-size:16px; }
    .group { border:1px solid #d4dee7; border-radius:12px; padding:10px; margin-bottom:10px; }
    .name { font-weight:600; font-size:14px; margin-bottom:6px; color:#203544; }
    .actions { display:flex; gap:8px; margin-bottom:8px; }
    .actions button { border:1px solid #a9bccd; background:#f7fbff; border-radius:12px; padding:6px 16px; font-size:13px; cursor:pointer; }
    .actions .pass.active { background:#dcf4e5; border-color:#8bc19d; } .actions .fail.active { background:#f9e0e0; border-color:#cf9b9b; }
    .note { width:100%; min-height:76px; border:1px solid #ccd8e2; border-radius:10px; padding:10px; font-size:13px; } .note[disabled] { background:#f4f7fa; color:#8798a7; }

      const W=480, H=854;
      const state=new Map(); let currentKey='', currentMeta=null;
      function fit(){ const s=Math.min(viewport.clientWidth/W, viewport.clientHeight/H); canvas.style.transform=`scale(${s})`; document.documentElement.style.setProperty('--scale', String(s || 1)); }
      function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
      function rowHtml(name, recKey, rec){ const r=rec||{status:'',note:''}; const dis=r.status!=='fail'?'disabled':''; return `<div class="group" data-key="${esc(recKey)}"><div class="name">${esc(name)}</div><div class="actions"><button class="pass ${r.status==='pass'?'active':''}" data-action="pass">Pass</button><button class="fail ${r.status==='fail'?'active':''}" data-action="fail">Fail</button></div><textarea class="note" placeholder="Fail note" ${dis}>${esc(r.note)}</textarea></div>`; }
      function render(){ if(!currentMeta) return; const m=currentMeta; const key=`${m.tag}|${m.text}`; const saved=state.get(key)||{}; const titleIdentity = String(m.text || m.tag || '').trim(); pTitle.textContent = `${m.categoryTitle || 'Screen Button'} Test${titleIdentity ? ` - ${titleIdentity}` : ''}`; const rows=[]; for(const t of (m.targets||[])){ const display=t.startsWith('Variable:') ? t.replace('Variable:','Variable ') : t; rows.push(rowHtml(display, t, saved[t])); } pRows.innerHTML=rows.length ? rows.join('') : '<div class="group"><div class="name">No true test targets.</div></div>'; }
      function open(meta){ const sanitized={...meta}; const hasTag=!!(sanitized.tag && String(sanitized.tag).trim()); const textRaw=String(sanitized.text||''); const isTagOnly=/^\s*\$%TAG![^%]+%\$\s*$/.test(textRaw); let targets=(sanitized.targets||[]).filter(t=>hasTag || t!=='Macro'); if(isTagOnly){ targets=targets.filter(t=>t!=='Text'); if(!targets.includes('TextVariable')) targets.push('TextVariable'); } sanitized.targets=targets; currentMeta=sanitized; currentKey=`${sanitized.tag}|${sanitized.text}`; render(); overlay.classList.add('open'); }
      function close(){overlay.classList.remove('open');}
      canvas.querySelectorAll('.item').forEach(el=>el.addEventListener('click',()=>open(JSON.parse(el.dataset.meta))));
      pRows.addEventListener('click',e=>{ const b=e.target.closest('button[data-action]'); if(!b||!currentKey) return; const row=b.closest('.group'); const k=row.dataset.key; const a=b.dataset.action; const recs=state.get(currentKey)||{}; recs[k]=recs[k]||{status:'',note:''}; recs[k].status=a; if(a!=='fail') recs[k].note=''; state.set(currentKey,recs); render(); });
      pRows.addEventListener('input',e=>{ if(!e.target.classList.contains('note')||!currentKey) return; const row=e.target.closest('.group'); const k=row.dataset.key; const recs=state.get(currentKey)||{}; recs[k]=recs[k]||{status:'',note:''}; recs[k].note=e.target.value; state.set(currentKey,recs); });
      pClose.addEventListener('click',close); overlay.addEventListener('click',e=>{if(e.target===overlay) close();}); window.addEventListener('keydown',e=>{if(e.key==='Escape') close();});
      fit(); window.addEventListener('resize',fit);
    })();
  </script>
</body>
</html>
