<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IST-5 (Global) - Lights</title>
  <style>
    :root {
      --canvas-w: 480px;
      --canvas-h: 854px;
      --scale: 1;
      --line: #c8d4df;
      --button-bg: #1c5e87;
      --button-fg: #fff;
      --accent: #f5a623;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #f8fbfd, #edf3f8);
      color: #102534;
    }
    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .stage {
      display: grid;
      grid-template-columns: 64px min(var(--canvas-w), 96vw) 64px;
      grid-template-areas:
        ". header ."
        "vprev viewport vnext"
        ". vind .";
      align-items: center;
      gap: 10px;
    }
    .header-title {
      grid-area: header;
      margin: 0 0 8px;
      width: min(var(--canvas-w), 96vw);
      font-size: 14px;
      font-weight: 700;
      color: #415c70;
      border: 0;
      border-radius: 0;
      padding: 2px 0 4px;
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .viewport {
      grid-area: viewport;
      width: min(var(--canvas-w), 96vw);
      aspect-ratio: calc(480 / 854);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #f7fafc;
    }
    .canvas {
      position: relative;
      width: var(--canvas-w);
      height: var(--canvas-h);
      transform-origin: top left;
    }
    .item {
      position: absolute;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.16);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 4px;
      overflow: hidden;
      line-height: 1.1;
      font-size: calc(var(--btn-fs, 10px) / var(--scale));
      background: linear-gradient(180deg, #2372a1, var(--button-bg));
      color: var(--button-fg);
      white-space: pre-line;
      cursor: pointer;
    }
    .item span { pointer-events: none; }
    .vp-shell {
      position: absolute;
      border: 2px dashed #89a8bf;
      border-radius: 14px;
      background: rgba(169, 193, 210, 0.25);
    }

    .vp-nav {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      border: 3px solid var(--accent);
      background: transparent;
      color: #344b5d;
      font-size: 20px;
      display: grid;
      place-items: center;
      cursor: pointer;
      user-select: none;
    }
    .vp-nav:disabled { opacity: 0.35; cursor: default; }
    .vp-prev { grid-area: vprev; justify-self: center; }
    .vp-next { grid-area: vnext; justify-self: center; }
    .vp-indicator {
      grid-area: vind;
      justify-self: center;
      display: flex;
      gap: 8px;
      min-height: 14px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid #9fb4c6;
      background: #e2ebf2;
    }
    .dot.active {
      background: #2d5f81;
      border-color: #2d5f81;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(11, 23, 33, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 1000;
    }
    .overlay.open { display: flex; }
    .popup {
      width: min(720px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border: 1px solid #c7d4df;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 20px 36px rgba(0, 0, 0, 0.2);
    }
    .popup h3 { margin: 0 0 10px; font-size: 16px; }
    .group { border: 1px solid #d4dee7; border-radius: 12px; padding: 10px; margin-bottom: 10px; }
    .name { font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #203544; }
    .actions { display: flex; gap: 8px; margin-bottom: 8px; }
    .actions button { border: 1px solid #a9bccd; background: #f7fbff; border-radius: 12px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
    .actions .pass.active { background: #dcf4e5; border-color: #8bc19d; }
    .actions .fail.active { background: #f9e0e0; border-color: #cf9b9b; }
    .note { width: 100%; min-height: 76px; border: 1px solid #ccd8e2; border-radius: 10px; padding: 10px; font-size: 13px; }
    .note[disabled] { background: #f4f7fa; color: #8798a7; }
    .footer { display: flex; justify-content: flex-end; }
    .close { border: 1px solid #a9bccd; background: #f7fbff; border-radius: 12px; padding: 8px 18px; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">

      <button class="vp-nav vp-prev" id="vpPrevBtn" aria-label="Previous frame">&lsaquo;</button>

      <div class="viewport" id="viewport"><div class="canvas" id="canvas"></div></div>
      <button class="vp-nav vp-next" id="vpNextBtn" aria-label="Next frame">&rsaquo;</button>
      <div class="vp-indicator" id="vpIndicator"></div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="popup">
      <h3 id="pTitle">Screen Button Test</h3>
      <div id="pRows"></div>
      <div class="footer"><button class="close" id="pClose">Close</button></div>
    </div>
  </div>

      function targetsFor(btn) {
        const t = btn.testTargets || {};
        const out = [];
        if (t.text) out.push("Text");

        const v = Object.assign({}, varsOff, t.variables || {});
        if (v.Reversed) out.push("Variable Reversed");
        if (v.Inactive) out.push("Variable Inactive");
        if (v.Visible) out.push("Variable Visible");
        if (v.Value) out.push("Variable Value");
        if (v.State) out.push("Variable State");
        if (v.Command) out.push("Variable Command");

      function addButton(btn, categoryTitle, offsetLeft = 0, offsetTop = 0) {
        const ui = btn.buttonUI || {};

        const el = document.createElement("button");

        el.style.left = `${Number(c.left || 0) + Number(offsetLeft || 0)}px`;
        el.style.top = `${Number(c.top || 0) + Number(offsetTop || 0)}px`;
        el.style.width = `${Number(c.width || 0)}px`;
        el.style.height = `${Number(c.height || 0)}px`;
        const fs = appUi.buttonPresentation.useProjectFontSize ? Number(ui.fontSize || appUi.buttonPresentation.fallbackFontSize) : Number(appUi.buttonPresentation.fallbackFontSize);
        el.style.setProperty("--btn-fs", `${fs}px`);

        const meta = {
          categoryTitle,
          tag: String(btn.buttonIdentity?.buttonTagName || ""),
          text: String(btn.buttonIdentity?.text || ""),
          targets: targetsFor(btn)

        el.dataset.meta = JSON.stringify(meta);

          vpNextBtn.style.display = "none";
          vpIndicator.style.display = "none";

      function stepFrame(direction) {
        if (!viewportModel) return;
        const idx = viewportModel.frames.findIndex((f) => f.frameId === activeFrameId);
        if (idx < 0) return;
        const next = idx + direction;
        if (appUi.viewportNavigation.behavior.wrapFrames) {
          const count = viewportModel.frames.length;
          activeFrameId = viewportModel.frames[(next + count) % count].frameId;
        } else {

          activeFrameId = viewportModel.frames[next].frameId;

        renderPageInsideRtiBox();
        setNavState();

        const r = rec || { status: "", note: "" };
        const disabled = r.status !== "fail" ? "disabled" : "";
        return `<div class="group" data-key="${esc(key)}"><div class="name">${esc(name)}</div><div class="actions"><button class="pass ${r.status === "pass" ? "active" : ""}" data-action="pass">Pass</button><button class="fail ${r.status === "fail" ? "active" : ""}" data-action="fail">Fail</button></div><textarea class="note" placeholder="Fail note" ${disabled}>${esc(r.note)}</textarea></div>`;
      }

      function renderPopup() {
        if (!currentMeta) return;
        const key = `${currentMeta.tag}|${currentMeta.text}`;
        const saved = state.get(key) || {};
        const identity = String(currentMeta.text || currentMeta.tag || "").trim();
        pTitle.textContent = fillTemplate(appUi.testingPopup.titleTemplate, { category: currentMeta.categoryTitle, identity });
        const rows = (currentMeta.targets || []).map((t) => rowHtml(t, t, saved[t]));
        pRows.innerHTML = rows.length ? rows.join("") : '<div class="group"><div class="name">No true test targets.</div></div>';
      }

      function openPopup(meta) {
        if (!appUi.testingPopup.enabled) return;
        currentMeta = meta;
        currentKey = `${meta.tag}|${meta.text}`;
        renderPopup();
        overlay.classList.add("open");
      }

      function closePopup() {
        overlay.classList.remove("open");
      }

      pRows.addEventListener("click", (e) => {
        const b = e.target.closest("button[data-action]");
        if (!b || !currentKey) return;
        const row = b.closest(".group");
        const targetKey = row.dataset.key;
        const action = b.dataset.action;
        const recs = state.get(currentKey) || {};
        recs[targetKey] = recs[targetKey] || { status: "", note: "" };
        recs[targetKey].status = action;
        if (action !== "fail") recs[targetKey].note = "";
        state.set(currentKey, recs);
        renderPopup();
      });

      pRows.addEventListener("input", (e) => {
        if (!e.target.classList.contains("note") || !currentKey) return;
        const row = e.target.closest(".group");
        const targetKey = row.dataset.key;
        const recs = state.get(currentKey) || {};
        recs[targetKey] = recs[targetKey] || { status: "", note: "" };
        recs[targetKey].note = e.target.value;
        state.set(currentKey, recs);
      });

      vpPrevBtn.addEventListener("click", () => stepFrame(-1));
      vpNextBtn.addEventListener("click", () => stepFrame(1));
      pClose.addEventListener("click", closePopup);
      overlay.addEventListener("click", (e) => { if (e.target === overlay) closePopup(); });
      window.addEventListener("keydown", (e) => { if (e.key === "Escape") closePopup(); });

      setHeader();
      renderPageInsideRtiBox();
      setNavState();
      fitCanvas();
      window.addEventListener("resize", fitCanvas);
    })();
  </script>
</body>
</html>
