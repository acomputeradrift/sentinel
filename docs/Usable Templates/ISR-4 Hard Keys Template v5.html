<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISR-4 Hard Keys Template v5</title>
  <!--
    v5 (from v4): chrome padding 10px → 25px; chrome border-box +30 W / +30 H so .layout stays 480×671×s (content unchanged).
    v4: d-pad −10px top vs v3; v3 spacer swap vs v2.
  -->
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* 480 + 50 + 2 = 532; height: 2 border + 50 vertical pad + layout */
    .chrome {
      width: 532px;
      height: calc(52px + 671px * 480 / 538);
      padding: 25px;
      border: 1px solid #000000;
      background: #ffffff;
    }

    .layout {
      position: relative;
      width: 480px;
      height: calc(671px * 480 / 538);
      display: flex;
      flex-direction: column;
      background: #ffffff;
      overflow: hidden;
    }

    .row {
      display: flex;
      align-items: center;
      padding: 0;
      width: 100%;
      flex: 0 0 auto;
    }

    .row.row-top {
      justify-content: space-between;
    }

    .row.row-3col {
      column-gap: calc(10px * 480 / 538);
    }

    .cell {
      display: flex;
      justify-content: center;
      align-items: center;
      width: calc(518px * 480 / (3 * 538));
      flex: 0 0 auto;
    }

    .cell.left {
      justify-content: flex-start;
    }

    .cell.right {
      justify-content: flex-end;
    }

    .box {
      flex: 0 0 auto;
      border: 1px solid #000000;
      background: transparent;
    }

    .top-box {
      width: calc(176px * 480 / 538);
      height: calc(68px * 480 / 538);
    }

    .side-box {
      width: calc(132px * 480 / 538);
      height: calc(91px * 480 / 538);
    }

    .small-box {
      width: calc(89px * 480 / 538);
      height: calc(52px * 480 / 538);
    }

    .main-box {
      width: calc(518px * 480 / (3 * 538));
      height: calc(68px * 480 / 538);
    }

    .dpad-box {
      position: absolute;
      width: calc(79px * 480 / 538);
      height: calc(79px * 480 / 538);
    }

    /* Hub: r3 row center; −10px matches v3 spacer-after-r1 trim */
    .dpad-ok {
      left: 50%;
      top: calc(275.5px * 480 / 538 - 10px);
      transform: translate(-50%, -50%);
    }

    .dpad-up {
      left: 50%;
      top: calc((275.5px - 79px - 4px) * 480 / 538 - 10px);
      transform: translate(-50%, -50%);
    }

    .dpad-down {
      left: 50%;
      top: calc((275.5px + 79px + 4px) * 480 / 538 - 10px);
      transform: translate(-50%, -50%);
    }

    .dpad-left {
      left: calc(50% - (79px + 4px) * 480 / 538);
      top: calc(275.5px * 480 / 538 - 10px);
      transform: translate(-50%, -50%);
    }

    .dpad-right {
      left: calc(50% + (79px + 4px) * 480 / 538);
      top: calc(275.5px * 480 / 538 - 10px);
      transform: translate(-50%, -50%);
    }

    /* Discrete vertical spacers (ISR-2 pattern) */
    .spacer-after-r1 { height: calc(69px * 480 / 538 - 10px); flex: 0 0 auto; }
    /* Green group: identical spacing between side-column rows (see Fixed Pixel ISR-4 spacing.png) */
    .spacer-green-mid { height: calc(21.5px * 480 / 538); flex: 0 0 auto; }
    .spacer-middle-main { height: calc(25px * 480 / 538 + 10px); flex: 0 0 auto; }
    .spacer-main { height: calc(14px * 480 / 538); flex: 0 0 auto; }
  </style>
</head>
<body>
  <div class="chrome" aria-label="ISR-4 hard keys template v5: 25px chrome padding, layout 480 wide unchanged vs v4">
    <div class="layout">
    <div class="row row-top">
      <div class="box top-box" data-label="c1 r1"></div>
      <div class="box top-box" data-label="c3 r1"></div>
    </div>

    <div class="spacer-after-r1"></div>

    <div class="row row-3col">
      <div class="cell left"><div class="box side-box" data-label="c1 r2"></div></div>
      <div class="cell"></div>
      <div class="cell right"><div class="box side-box" data-label="c3 r2"></div></div>
    </div>

    <div class="spacer-green-mid"></div>

    <div class="row row-3col">
      <div class="cell left"><div class="box small-box" data-label="c1 r3"></div></div>
      <div class="cell"></div>
      <div class="cell right"><div class="box small-box" data-label="c3 r3"></div></div>
    </div>

    <div class="spacer-green-mid"></div>

    <div class="row row-3col">
      <div class="cell left"><div class="box side-box" data-label="c1 r4"></div></div>
      <div class="cell"></div>
      <div class="cell right"><div class="box side-box" data-label="c3 r4"></div></div>
    </div>

    <div class="spacer-middle-main"></div>

    <div class="row row-3col">
      <div class="cell"><div class="box main-box" data-label="c1 r5"></div></div>
      <div class="cell"><div class="box main-box" data-label="c2 r5"></div></div>
      <div class="cell"><div class="box main-box" data-label="c3 r5"></div></div>
    </div>

    <div class="spacer-main"></div>

    <div class="row row-3col">
      <div class="cell"><div class="box main-box" data-label="c1 r6"></div></div>
      <div class="cell"><div class="box main-box" data-label="c2 r6"></div></div>
      <div class="cell"><div class="box main-box" data-label="c3 r6"></div></div>
    </div>

    <div class="spacer-main"></div>

    <div class="row row-3col">
      <div class="cell"><div class="box main-box" data-label="c1 r7"></div></div>
      <div class="cell"><div class="box main-box" data-label="c2 r7"></div></div>
      <div class="cell"><div class="box main-box" data-label="c3 r7"></div></div>
    </div>

    <div class="box dpad-box dpad-up" data-label="dpad up"></div>
    <div class="box dpad-box dpad-left" data-label="dpad left"></div>
    <div class="box dpad-box dpad-ok" data-label="dpad ok"></div>
    <div class="box dpad-box dpad-right" data-label="dpad right"></div>
    <div class="box dpad-box dpad-down" data-label="dpad down"></div>
    </div>
  </div>
</body>
</html>
